name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk autoconf automake libtool libtool-bin \
            autoconf-archive libltdl-dev pkg-config \
            zlib1g-dev libncurses5-dev cmake libffi-dev \
            libssl-dev lld zip unzip
          
      - name: Install Python dependencies
        run: pip install buildozer cython==0.29.37
      
      - name: Build APK
        run: yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deutsch-lernen-apk
          path: bin/*.apk
          if-no-files-found: warn
